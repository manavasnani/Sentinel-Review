# Ground truth labels for the Sentinel Review test corpus.
#
# This file is the source of truth for what each test file SHOULD produce.
# Used by benchmark scripts to compute precision, recall, and F1.
#
# Each entry under vulnerable_samples lists the expected findings.
# Each entry under clean_samples should have zero findings; any finding is
# a false positive.
#
# When you tighten or update the prompt, you re-run the corpus and compare
# detection rate against this file.

vulnerable_samples:

  01_sql_injection.py:
    expected_findings:
      - cwe_id: CWE-89
        min_severity: high
        approximate_lines: [28, 29]
        notes: "f-string interpolation in SELECT"
      - cwe_id: CWE-89
        min_severity: high
        approximate_lines: [41, 42]
        notes: "string concatenation in LIKE"

  02_command_injection.py:
    expected_findings:
      - cwe_id: CWE-78
        min_severity: high
        approximate_lines: [27]
        notes: "os.system with user input"
      - cwe_id: CWE-78
        min_severity: high
        approximate_lines: [36, 37, 38]
        notes: "subprocess shell=True with user input"

  03_path_traversal.py:
    expected_findings:
      - cwe_id: CWE-22
        min_severity: high
        approximate_lines: [25, 26]
        notes: "unsanitized filename joined to upload dir"
      - cwe_id: CWE-22
        min_severity: high
        approximate_lines: [34, 35]
        notes: "user log name concatenated to log dir"

  04_hardcoded_credentials.py:
