clean_samples:

  01_parameterized_query.py:
    expected_findings: []
    notes: "All queries use parameterized APIs. Any finding is a false positive."

  02_bcrypt_password.py:
    expected_findings: []
    notes: "All hashing uses bcrypt/argon2/PBKDF2. Any finding is a false positive."

  03_safe_subprocess.py:
    expected_findings: []
    notes: "All subprocess calls use list args or shlex.quote. Any finding is a false positive."

  04_validated_url_fetch.py:
    expected_findings: []
    notes: "URL is validated against allowlist before fetch. Any finding is a false positive."