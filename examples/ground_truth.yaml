      - cwe_id: CWE-798
        min_severity: high
        approximate_lines: [18]
        notes: "hardcoded database password"
      - cwe_id: CWE-798
        min_severity: high
        approximate_lines: [19]
        notes: "hardcoded API token (payment service)"
      - cwe_id: CWE-798
        min_severity: high
        approximate_lines: [20]
        notes: "hardcoded JWT signing key"
      - cwe_id: CWE-798
        min_severity: high
        approximate_lines: [21, 22]
        notes: "hardcoded AWS access key and secret key"
      - cwe_id: CWE-798
        min_severity: high
        approximate_lines: [44, 46]
        notes: "credentials embedded in database URL"

  05_weak_crypto.py:
    expected_findings:
      - cwe_id: CWE-916
        min_severity: high
        approximate_lines: [22, 23]
        notes: "MD5 for password hashing (CWE-916, not CWE-327)"
      - cwe_id: CWE-916
        min_severity: high
        approximate_lines: [27, 28]
        notes: "SHA-1 for password hashing (CWE-916, not CWE-327)"
      - cwe_id: CWE-327
        min_severity: high
        approximate_lines: [33, 34]
        notes: "AES-ECB mode"
      - cwe_id: CWE-326
        min_severity: high
        approximate_lines: [38, 39]
        notes: "DES (56-bit key)"
      - cwe_id: CWE-329
        min_severity: medium
        approximate_lines: [49, 50]
        notes: "fixed IV in CBC mode (CWE-329, not CWE-327)"

  06_ssrf.py:
    expected_findings:
      - cwe_id: CWE-918
        min_severity: high
        approximate_lines: [22, 23, 24, 25, 26]
        notes: "fetch user-supplied URL with no allowlist"
      - cwe_id: CWE-918
        min_severity: high
        approximate_lines: [33, 34, 35, 36]
        notes: "webhook proxy to user-supplied target"

  07_insecure_deserialization.py:
    expected_findings:
      - cwe_id: CWE-502
        min_severity: critical
        approximate_lines: [23, 24, 25]
